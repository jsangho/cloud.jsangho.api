[tool.ruff]
line-length = 88
target-version = "py313"
exclude = [
    ".git",
    "__pycache__",
    "alembic/",
    "pytorch_env/",
    ".venv/",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",  # line-length — ruff format handles this
    "B008",  # FastAPI Depends() in default args
    "N999",  # module name with hyphens (앱 디렉터리명)
    "N815",  # Pydantic 스키마 camelCase 필드 (API 응답 컨벤션)
    "N803",  # ML 관례 대문자 파라미터 (X, y) 및 API 파라미터
    "N806",  # 테스트 Mock 변수 명명 관례
]

[tool.ruff.lint.per-file-ignores]
"main.py" = ["E402"]           # sys.path.insert 이후 import 구조적 필요
"**/scripts/*.py" = ["E402"]   # standalone 스크립트 sys.path 조작

[tool.ruff.lint.isort]
known-first-party = [
    "jsangho",
    "ontology",
    "titanic",
    "kayfabe",
    "superstar",
    "human_resource",
    "imitation_game",
    "inception",
    "social_network",
    "manager",
]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
exclude = [
    "alembic/",
    "pytorch_env/",
    "__pycache__/",
]
